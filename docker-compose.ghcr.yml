# FoxRouters — Easy Deploy (pre-built image from ghcr.io)
# Usage:
#   curl -sLO https://raw.githubusercontent.com/rilspratama/Foxrouters/master/docker-compose.ghcr.yml
#
# Default (SQLite backend, lightweight):
#   docker compose -f docker-compose.ghcr.yml up -d
#
# ClickHouse backend (analytics):
#   LOG_BACKEND=clickhouse docker compose -f docker-compose.ghcr.yml --profile clickhouse up -d
#
# No build needed — pulls pre-built image from GitHub Container Registry.

services:
  redis:
    image: redis:7-alpine
    container_name: foxrouters-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: foxrouters-clickhouse
    profiles: ["clickhouse"]
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  foxrouters:
    image: ghcr.io/rilspratama/foxrouters:latest
    container_name: foxrouters
    ports:
      - "20130:20130"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      LOG_BACKEND: "${LOG_BACKEND:-sqlite}"
      LOG_SQLITE_PATH: /var/lib/foxrouters/logs.db
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: foxrouters
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      PORT: "20130"
    volumes:
      - sqlite-data:/var/lib/foxrouters
    restart: unless-stopped

volumes:
  redis-data:
  clickhouse-data:
  sqlite-data:
